<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ccff00",
                        "background-light": "#f8f8f5",
                        "background-dark": "#1f230f",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Parchados - Inicio de Sesión</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<!-- TopAppBar Navigation -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">close</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Parchados</h2><button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center cursor-pointer hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">light_mode</span>
</button>
</div>
<!-- Hero Section / Branding -->
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-background-dark @[480px]:rounded-xl min-h-[240px] relative" data-alt="Nightlife party crowd with neon lights atmosphere" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDvVu8YMtO1H6O0C0ZJTOhwyoTqZXum0Xls9rSSNLPxBFY-SioLRVU9fRBOn4zNytNgMXKp9tRG57mmKVM8nkse6lTxyHCArX5bUj8EK6peTP4KErwH8YMhxzN5Iar7v7wHsgnZP1eD336e9AQB2qucxJEVSy-ZiAcDg_-3_7SubKfuOgPMjGlQ09zBE5oL6CLdZwTVLTg6WRwog6-kOMBBy0BySQmbd0X_b2gdnWb1XVsiXhkDUe_01VtDWK81oTJCkGSctzK2qlA");'>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark via-background-dark/40 to-transparent"></div>
</div>
</div>
</div>
<div class="max-w-[480px] mx-auto w-full px-4">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight text-center pb-2 pt-8">Bienvenido</h1>
<p class="text-slate-600 dark:text-slate-400 text-center text-sm mb-8">Accede a las mejores experiencias de tu ciudad</p>
<!-- Login Form -->
<form action="explora.html" class="space-y-4">
<div class="flex flex-col gap-1">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold px-1">Usuario</label>
<input class="form-input w-full rounded-xl border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] text-base" placeholder="Tu nombre de usuario o email" type="text"/>
</div>
<div class="flex flex-col gap-1">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold px-1">Contraseña</label>
<div class="relative flex items-center">
<input class="form-input w-full rounded-xl border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] pr-12 text-base" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-slate-400 dark:text-slate-500 hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between py-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="rounded border-primary/40 text-primary focus:ring-primary bg-transparent w-5 h-5" type="checkbox"/>
<span class="text-sm text-slate-600 dark:text-slate-300 group-hover:text-primary transition-colors">Recordarme</span>
</label>
<a class="text-sm font-medium text-primary hover:underline" href="#">¿Olvidaste tu contraseña?</a>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary hover:opacity-90 text-background-dark font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/10 mt-4 text-lg" type="submit">
                    Ingresar
                </button>
<!-- Secondary Actions -->
<button class="w-full border-2 border-primary/30 hover:border-primary text-slate-900 dark:text-slate-100 font-semibold py-4 rounded-xl transition-all mt-3" type="button">
                    Entrar como invitado
                </button>
</form>
<!-- Links & Footer -->
<div class="mt-10 mb-12 space-y-6 text-center">
<div class="relative flex items-center justify-center">
<div class="flex-grow border-t border-slate-200 dark:border-primary/10"></div>
<span class="px-4 text-xs uppercase tracking-widest text-slate-400 dark:text-slate-500">O también</span>
<div class="flex-grow border-t border-slate-200 dark:border-primary/10"></div>
</div>
<div class="space-y-4">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                        ¿Nuevo en Parchados? 
                        <a class="text-primary font-bold hover:underline ml-1" href="#">Crea tu cuenta</a>
</p>
<a class="inline-flex items-center gap-2 text-sm text-primary/80 hover:text-primary transition-colors font-medium" href="#">
<span class="material-symbols-outlined text-lg">storefront</span>
                        Registrarse como comercio aliado
                    </a>
</div>
</div>
</div>
<!-- Decorative background element for Midnight Luxe feel -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-primary/5 blur-[120px] rounded-full"></div>
<div class="fixed bottom-0 left-0 -z-10 w-96 h-96 bg-primary/10 blur-[150px] rounded-full"></div>
</div>
</body></html>
