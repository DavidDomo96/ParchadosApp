<!DOCTYPE html>

<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ccff00",
                        "background-light": "#f8f8f5",
                        "background-dark": "#1f230f",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .qr-scanner-overlay {
            background: linear-gradient(rgba(31, 35, 15, 0.3), rgba(31, 35, 15, 0.3)),
                radial-gradient(circle, transparent 150px, rgba(31, 35, 15, 0.9) 150px);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <!-- Header -->
        <div
            class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-20">
            <button onclick="window.location.href='explora.html'"
                class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h2
                class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">
                Validación de Asistencia</h2>
            <button
                class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-xl hover:bg-white/5 transition-colors">
                <span class="material-symbols-outlined">light_mode</span>
            </button>
        </div>
        <!-- Camera Viewport Simulator -->
        <div
            class="relative flex-1 flex flex-col items-center justify-center min-h-[400px] bg-slate-800 overflow-hidden">
            <!-- Simulated Camera Background -->
            <img alt="Concert stage with colorful lights and crowd"
                class="absolute inset-0 w-full h-full object-cover opacity-60"
                data-alt="Blurred concert background with vibrant stage lighting"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBTlPUc0SdzGPgIPin--HEfdt4_ab0_BMsXQCdpqYwtm3suOf50pT2Qn3mkzrhHv0-iBP24hY-36Seexw6lkpFcU_W4m_qQIx_y3WKSnWIC-2jgfxS5y2V-zjSCFpG2yLFKolehhfGmnUImcpeYA7pzA_mOSd-siWZIS7g_5YrKbBlRoIFsv_ZQ-EqjyajGTV-CmCFR7UOuotnehXhaNG_o1S53K9oBJCi4MEEexVqqP-3tqnJyI0kz2KVpdklP-miGM7I4KAGv_1g" />
            <!-- Scanner Overlay -->
            <div class="absolute inset-0 qr-scanner-overlay z-10"></div>
            <!-- QR Frame -->
            <div class="relative z-10 w-64 h-64 border-2 border-primary/50 rounded-xl flex items-center justify-center">
                <!-- Corner Accents -->
                <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-lg"></div>
                <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-lg"></div>
                <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-lg"></div>
                <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-lg"></div>
                <!-- Scanning Line -->
                <div
                    class="w-full h-0.5 bg-primary/80 shadow-[0_0_15px_rgba(204,255,0,0.8)] absolute top-1/2 -translate-y-1/2 animate-pulse">
                </div>
            </div>
            <!-- Controls Overlay -->
            <div class="absolute bottom-10 left-0 right-0 z-20 flex items-center justify-center gap-8">
                <button
                    class="flex shrink-0 items-center justify-center rounded-full size-12 bg-background-dark/60 text-white backdrop-blur-md border border-white/10">
                    <span class="material-symbols-outlined">image</span>
                </button>
                <button
                    class="flex shrink-0 items-center justify-center rounded-full size-20 bg-primary text-background-dark shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined !text-4xl">qr_code_scanner</span>
                </button>
                <button
                    class="flex shrink-0 items-center justify-center rounded-full size-12 bg-background-dark/60 text-white backdrop-blur-md border border-white/10">
                    <span class="material-symbols-outlined">flashlight_on</span>
                </button>
            </div>
        </div>
        <!-- Instructional Content -->
        <div
            class="bg-background-light dark:bg-background-dark px-6 py-8 flex flex-col items-center text-center gap-4 rounded-t-xl -mt-4 relative z-20 shadow-2xl">
            <h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-2xl font-bold leading-tight">Escanea el
                código QR</h3>
            <p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed max-w-xs">
                Escanea el código en el evento para validar tu asistencia y sumar <span
                    class="text-primary font-bold">50 puntos</span> a tu perfil.
            </p>
            <div class="w-full flex flex-col gap-3 mt-4">
                <button
                    class="w-full bg-primary/10 border border-primary/30 text-primary font-bold py-4 rounded-xl hover:bg-primary/20 transition-colors">
                    Ingresar código manual
                </button>
                <button
                    class="w-full bg-transparent text-slate-500 dark:text-slate-400 font-medium py-2 rounded-xl text-sm">
                    ¿Problemas con el escáner? Ayuda
                </button>
            </div>
        </div>
        <!-- Bottom Navigation Bar -->
        <div
            class="mt-auto flex gap-2 border-t border-slate-200 dark:border-background-dark/50 bg-background-light dark:bg-background-dark px-4 pb-6 pt-2 sticky bottom-0 z-30">
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400"
                href="explora.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">home</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-wide">Inicio</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400"
                href="filtros.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">explore</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-wide">Explorar</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="escaner.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined !fill-1">qr_code_2</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-wide">Escanear</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400"
                href="puntos.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">group</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-wide">Parchados</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400"
                href="perfil.html">
                <div class="flex h-8 items-center justify-center">
                    <span class="material-symbols-outlined">person</span>
                </div>
                <p class="text-[10px] font-medium leading-normal tracking-wide">Perfil</p>
            </a>
        </div>
    </div>
</body>

</html>
